name: 运行龙虎榜爬虫

on:
  workflow_dispatch:

jobs:
  scrape_and_export:
    runs-on: ubuntu-latest

    steps:
    - name: 拉取代码
      uses: actions/checkout@v4

    - name: 配置 Python 环境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 安装 Python 依赖包
      run: |
        python -m pip install --upgrade pip
        pip install selenium pandas openpyxl

    - name: 执行爬虫脚本
      run: python scraper.py

    - name: 上传 Excel 文件供下载
      uses: actions/upload-artifact@v4
      with:
        name: 龙虎榜抓取结果
        path: 龙虎榜数据.xlsx
